<div class="author-box">
  <div class="author-avatar">
    <div class="author-avatar-fallback">$</div>
  </div>
  <div class="author-info">
    <h4>Written by {{ site.author.name }}</h4>
    <p>{{ site.author.bio }}</p>
    {% if site.author.pinterest %}
    <a href="{{ site.author.pinterest }}" target="_blank" rel="noopener" style="color:var(--clr-primary);font-weight:600;font-size:0.9rem;">Follow on Pinterest &rarr;</a>
    {% endif %}
  </div>
</div>
