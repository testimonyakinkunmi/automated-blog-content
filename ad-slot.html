{% comment %} AdSense placeholder — the slot ID is a placeholder; replace with real slot after approval. {% endcomment %}
<div class="ad-slot" aria-label="Advertisement">
  {% if site.adsense_client != "ca-pub-XXXXXXXXXX" %}
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ site.adsense_client }}"
       data-ad-slot="{{ include.slot_id | default: '1234567890' }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  {% else %}
  {%- comment -%} Ad slot placeholder — AdSense not yet configured {%- endcomment -%}
  <div class="ad-placeholder">Ad Space</div>
  {% endif %}
</div>
